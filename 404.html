  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0f1a; color: #94a3b8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }

    p { font-size: 1rem; line-height: 1.7; margin-bottom: 32px; }
    a.btn { display: inline-block; background: #2dd4bf; color: #0a0f1a; padding: 14px 32px; border-radius: 50px; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }

  </style>
</head>
<body>
  <main class="box">
    <div class="code">404</div>
